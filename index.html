/* ===== POPULATE SALE OFFICE A-Z ===== */
function populateSaleOffice(){
    const officeSet = new Set();

    for(const code in dealers){
        officeSet.add(dealers[code].saleOffice);
    }

    const sortedOffices = Array.from(officeSet).sort((a,b)=>a.localeCompare(b));
    const dropdown = document.getElementById("saleOfficeFilter");

    sortedOffices.forEach(office=>{
        const option = document.createElement("option");
        option.value = office;
        option.textContent = office;
        dropdown.appendChild(option);
    });
}

populateSaleOffice();

/* ===== SEARCH FUNCTION ===== */
function searchDealer(){

    const query = document.getElementById("searchBox").value.trim().toLowerCase();
    const selectedOffice = document.getElementById("saleOfficeFilter").value;
    const resultDiv = document.getElementById("result");

    if(query === "" && selectedOffice === ""){
        resultDiv.innerHTML = "";
        return;
    }

    let output = "";
    let count = 0;

    for(const code in dealers){

        const d = dealers[code];

        const matchSearch =
            code.toLowerCase().includes(query) ||
            d.name.toLowerCase().includes(query);

        const matchOffice =
            selectedOffice === "" ||
            d.saleOffice === selectedOffice;

        if(matchSearch && matchOffice){
            count++;

            output += `
            <div class="dealer-card">
                <strong>Dealer Code:</strong> ${code}<br>
                <strong>Name:</strong> ${d.name}<br>
                <strong>Sale Office:</strong> ${d.saleOffice}<br>
                <strong>ECMS:</strong> ${d.ecms}<br>
                <strong>UPI:</strong> ${d.upi}<br>
                <strong>IFSC:</strong> ${d.ifsc}
            </div>
            `;
        }
    }

    if(count > 0){
        resultDiv.innerHTML = `<p class="count">Total Dealers: ${count}</p>` + output;
    } else {
        resultDiv.innerHTML = "<span style='color:red;'>No Dealers Found!</span>";
    }
}

</script>
